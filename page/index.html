<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAND Gate Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --grid-color: rgba(0, 255, 102, 0.03);
            --primary-color: #00ff66;
            --primary-dim: rgba(0, 255, 102, 0.15);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            box-sizing: border-color;
            margin: 0;
            padding: 0;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            height: 100%;
            overflow: hidden;
            width: 100%;
        }

        /* Logic Grid Canvas Background */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Core Interface Layout */
        main {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
        }

        .terminal-card {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: border-color 0.3s ease;
        }

        .terminal-card:hover {
            border-color: rgba(0, 255, 102, 0.3);
        }

        /* NAND Logic Symbol Graphic */
        .nand-symbol {
            margin-bottom: 1.5rem;
            display: inline-block;
            opacity: 0.85;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        h1 span {
            color: var(--primary-color);
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .status-box {
            background: rgba(30, 41, 59, 0.4);
            border-left: 3px solid var(--primary-color);
            padding: 0.75rem 1rem;
            border-radius: 0 4px 4px 0;
            text-align: left;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary-color);
            animation: pulse 2s infinite;
        }

        /* Interactive Links / Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1.25rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--primary-dim);
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateX(4px);
        }

        .btn .arrow {
            opacity: 0.5;
            transition: transform 0.2s ease;
        }

        .btn:hover .arrow {
            opacity: 1;
            transform: translateX(2px);
        }

        footer {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.75rem;
            color: rgba(100, 116, 139, 0.6);
            z-index: 2;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.4); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 12px 4px rgba(0, 255, 102, 0.2); }
            100% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

        @media (max-width: 480px) {
            .terminal-card { padding: 1.5rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="circuitCanvas"></canvas>
    </div>

    <main>
        <div class="terminal-card">
            <!-- Inline SVG representing a functional NAND Gate schematic -->
            <div class="nand-symbol">
                <svg width="80" height="50" viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 15H25M10 35H25" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                    <path d="M25 5H40C49.3888 5 57 12.6112 57 22C57 31.3888 49.3888 39 40 39H25V5Z" fill="#111827" stroke="#00ff66" stroke-width="2"/>
                    <circle cx="63" cy="22" r="4" fill="#111827" stroke="#00ff66" stroke-width="2"/>
                    <path d="M67 22H78" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <h1>nandgate<span>labs</span></h1>
            <div class="tagline">Ordinarily extraordinary</div>

            <div class="status-box">
                <div class="status-line">
                    <div class="pulse-dot"></div>
                    <div>System Status: Initialized</div>
                </div>
            </div>

            <div class="links-container">
                <!-- Points to your newly configured subdomain -->
                <a href="https://shivamrut.nandgatelabs.com" class="btn">
                    <span>./execute --portfolio</span>
                    <span class="arrow">→</span>
                </a>
                <a href="https://blogs.nandgatelabs.com" class="btn" >
                    <span>./read --technical_blog</span>
                    <span class="arrow">→</span>
                </a>
            </div>
        </div>

        <footer>
            &copy; 2026 NAND Gate Labs. Universal completeness.
        </footer>
    </main>

    <script>
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Node structure for simulated system circuitry
        class CircuitNode {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.neighbors = [];
                this.signals = [];
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100, 116, 139, 0.15)';
                ctx.fill();
            }
        }

        // Simulates data packets traversing the infrastructure paths
        class DataSignal {
            constructor(startNode, endNode) {
                this.start = startNode;
                this.end = endNode;
                this.progress = 0;
                this.speed = 0.004 + Math.random() * 0.005;
                this.value = Math.random() > 0.5 ? "1" : "0";
            }

            update() {
                this.progress += this.speed;
                return this.progress >= 1;
            }

            draw() {
                const x = this.start.x + (this.end.x - this.start.x) * this.progress;
                const y = this.start.y + (this.end.y - this.start.y) * this.progress;
                
                ctx.fillStyle = '#00ff66';
                ctx.font = '10px "JetBrains Mono"';
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#00ff66';
                ctx.fillText(this.value, x - 3, y + 4);
                ctx.shadowBlur = 0; // reset
            }
        }

        const nodes = [];
        const signals = [];
        const spacing = 40;

        // Generate static alignment matrix matching the background layout grid
        for (let x = spacing; x < width; x += spacing * 2) {
            for (let y = spacing; y < height; y += spacing * 2) {
                if (Math.random() > 0.4) {
                    nodes.push(new CircuitNode(x, y));
                }
            }
        }

        // Construct horizontal and vertical traces connecting adjacent nodes
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                if (dist <= spacing * 2.5) {
                    nodes[i].neighbors.push(nodes[j]);
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Draw clean background traces
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(30, 41, 59, 0.2)';
            ctx.lineWidth = 1;
            for (let node of nodes) {
                node.draw();
                for (let neighbor of node.neighbors) {
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(neighbor.x, neighbor.y);
                }
            }
            ctx.stroke();

            // Handle signal spawning constraints
            if (signals.length < 25 && Math.random() > 0.85 && nodes.length > 0) {
                const start = nodes[Math.floor(Math.random() * nodes.length)];
                if (start.neighbors.length > 0) {
                    const end = start.neighbors[Math.floor(Math.random() * start.neighbors.length)];
                    signals.push(new DataSignal(start, end));
                }
            }

            // Loop and clean up active frames
            for (let i = signals.length - 1; i >= 0; i--) {
                const sig = signals[i];
                sig.draw();
                if (sig.update()) {
                    signals.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
